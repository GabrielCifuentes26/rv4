<script>
const { createClient } = supabase;
const client = createClient(
    'https://iipgrojliqeyycvgnkrc.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpcGdyb2psaXFleXljdmdua3JjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzA1NzYsImV4cCI6MjA5MTM0NjU3Nn0.Y6FQ-1qWd7HPMvTnK4alpKxM-YLJ5CsKmkorAZKMJrg'
);

client.auth.getSession().then(({ data: { session } }) => {
    if (!session) window.location.href = 'login.html';
});

document.getElementById('btn-logout').addEventListener('click', () => {
    client.auth.signOut().then(() => window.location.href = 'login.html');
});

const PROJECTS = [
    { id: 'bosquesdejalapa',    key: 'bdj', name: 'Bosques de Jalapa' },
    { id: 'bosquesdepinula',    key: 'bdp', name: 'Bosques de Pinula' },
    { id: 'bosquessantaelena',  key: 'bse', name: 'Bosques de Santa Elena' },
    { id: 'condadosantaelena',  key: 'cse', name: 'Condado Santa Elena' },
    { id: 'haciendalaquerencia',key: 'hlq', name: 'Hacienda La Querencia' },
    { id: 'reservadelbosque',   key: 'rdb', name: 'Reserva del Bosque' },
];

const PROJECT_M2 = {
    bdj: { casas: 16566.48, urbanizacion: 36248.76, total: 52815.24 },
    bdp: { casas: 30715.06, urbanizacion: 23331.69, total: 54046.75 },
    bse: { casas: 41272.94, urbanizacion: 27442.78, total: 68715.72 },
    cse: { casas: 42630.21, urbanizacion: 19427.66, total: 62057.87 },
    hlq: { casas: 10388.90, urbanizacion: 7282.77,  total: 17671.67 },
    rdb: { casas: 29940.56, urbanizacion: 33784.09, total: 63724.65 },
};

const fmt  = (v) => `Q ${Number(v).toLocaleString('es-GT', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
const fmtM = (v) => Number(v).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
const fmtD = (v) => `$${Number(v).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
const RATE  = 7.8;

function setSapAreasFromRows(project, rows) {
    if (!Array.isArray(rows) || rows.length === 0) return;
    const getRow = (kw) => rows.find(r => {
        const k = Object.keys(r).find(k => k.toLowerCase().includes('area'));
        return k && typeof r[k] === 'string' && r[k].toLowerCase().includes(kw);
    });
    const cRow = getRow('construcc');
    const uRow = getRow('urbaniz');
    project.areas = {
        construccion: Number(cRow?.['[PresupuestoErequester]']) || 0,
        urbanizacion:  Number(uRow?.['[PresupuestoErequester]']) || 0,
    };
    project.areas.total = project.areas.construccion + project.areas.urbanizacion;
}

async function loadData() {
    // Load M2 from Supabase
    try {
        const { data } = await client.from('project_m2').select('project_key, m2_casas, m2_urbanizacion, m2_total');
        if (Array.isArray(data)) data.forEach(r => {
            if (PROJECT_M2[r.project_key]) PROJECT_M2[r.project_key] = {
                casas:        Number(r.m2_casas)        || PROJECT_M2[r.project_key].casas,
                urbanizacion: Number(r.m2_urbanizacion) || PROJECT_M2[r.project_key].urbanizacion,
                total:        Number(r.m2_total)        || PROJECT_M2[r.project_key].total,
            };
        });
    } catch (_) {}

    // Load areas from v_project_sap_summary
    try {
        const { data } = await client
            .from('v_project_sap_summary')
            .select('project_key, por_area')
            .in('project_key', PROJECTS.map(p => p.key));
        if (Array.isArray(data)) data.forEach(row => {
            const p = PROJECTS.find(p => p.key === row.project_key);
            if (p && Array.isArray(row.por_area) && row.por_area.length) setSapAreasFromRows(p, row.por_area);
        });
    } catch (_) {}

    // Fallback: load areas from local JSON
    await Promise.all(PROJECTS.filter(p => !p.areas).map(async p => {
        try {
            const res = await fetch(`data/powerbi/${p.key}/porArea.json`, { cache: 'no-store' });
            if (res.ok) setSapAreasFromRows(p, (await res.json())?.rows);
        } catch (_) {}
    }));
}

function getBadge(p, allProjects) {
    if (!p.areas || p.areas.total === 0) return null;
    const m2 = PROJECT_M2[p.key];
    const costM2 = m2.total > 0 ? p.areas.total / m2.total : 0;

    const costs = allProjects.filter(x => x.areas && PROJECT_M2[x.key]?.total > 0)
        .map(x => x.areas.total / PROJECT_M2[x.key].total);
    const maxCost = Math.max(...costs);
    const minCost = Math.min(...costs);

    if (Math.abs(costM2 - maxCost) < 1) return { text: 'Más costoso', icon: '⚠️', cls: 'costoso' };
    if (Math.abs(costM2 - minCost) < 1) return { text: 'Proyecto más eficiente', icon: '🏆', cls: 'eficiente' };

    const casasPct = p.areas.construccion / p.areas.total;
    if (Math.abs(casasPct - 0.5) < 0.06) return { text: 'Costo equilibrado', icon: '✅', cls: 'equilibrado' };
    if (casasPct > 0.70) return { text: 'Fuerte componente de casas', icon: '🏠', cls: 'casas-alto' };
    if (casasPct > 0.60) return { text: 'Mayor peso de casas', icon: '📈', cls: 'casas-alto' };
    if ((1 - casasPct) > 0.60) return { text: 'Urbanización dominante', icon: '🏗️', cls: 'urb-alto' };
    return null;
}

function renderCard(p, idx, allProjects) {
    const m2     = PROJECT_M2[p.key];
    const areas  = p.areas || { construccion: 0, urbanizacion: 0, total: 0 };
    const noData = areas.total === 0;

    const qm2Casa = m2.casas > 0        ? areas.construccion / m2.casas : 0;
    const qm2Urb  = m2.urbanizacion > 0 ? areas.urbanizacion / m2.urbanizacion : 0;
    const qm2Tot  = m2.total > 0        ? areas.total / m2.total : 0;

    const casasPct = areas.total > 0 ? (areas.construccion / areas.total * 100) : 50;
    const urbPct   = 100 - casasPct;

    return `
    <div class="m2-card">
        <div class="m2-card-header">
            <div class="m2-card-left">
                <div class="m2-card-category">Proyecto Casas</div>
                <div class="m2-name">${p.name}</div>
            </div>
            <div class="m2-total-wrap">
                <div class="m2-total-label">Total con IVA</div>
                <div class="m2-total-val">${noData ? '—' : fmt(areas.total)}</div>
            </div>
        </div>
        <div class="m2-divider"></div>

        <table class="m2-table">
            <thead>
                <tr>
                    <th>Concepto</th>
                    <th>Costos</th>
                    <th>M² constr.</th>
                    <th>Costo x m²</th>
                    <th>Costo x m² $</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Casas</td>
                    <td>${fmt(areas.construccion)}</td>
                    <td>${fmtM(m2.casas)}</td>
                    <td>${qm2Casa > 0 ? `Q ${fmtM(qm2Casa)}` : '—'}</td>
                    <td>${qm2Casa > 0 ? fmtD(qm2Casa / RATE) : '—'}</td>
                </tr>
                <tr>
                    <td>Urbanización</td>
                    <td>${fmt(areas.urbanizacion)}</td>
                    <td>${fmtM(m2.urbanizacion)}</td>
                    <td>${qm2Urb > 0 ? `Q ${fmtM(qm2Urb)}` : '—'}</td>
                    <td>${qm2Urb > 0 ? fmtD(qm2Urb / RATE) : '—'}</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td>Total con IVA</td>
                    <td>${fmt(areas.total)}</td>
                    <td>${fmtM(m2.total)}</td>
                    <td>${qm2Tot > 0 ? `Q ${fmtM(qm2Tot)}` : '—'}</td>
                    <td>${qm2Tot > 0 ? fmtD(qm2Tot / RATE) : '—'}</td>
                </tr>
            </tfoot>
        </table>

        <div class="m2-bar-wrap">
            <div class="m2-bar">
                <div class="m2-bar-casas" style="width:${casasPct.toFixed(1)}%"></div>
                <div class="m2-bar-urb"   style="width:${urbPct.toFixed(1)}%"></div>
            </div>
            <div class="m2-bar-labels">
                <span class="m2-bar-lbl">
                    <span class="m2-bar-dot m2-bar-dot--casas"></span>
                    Casas (${casasPct.toFixed(1)}%)
                </span>
                <span class="m2-bar-lbl">
                    <span class="m2-bar-dot m2-bar-dot--urb"></span>
                    Urbanización (${urbPct.toFixed(1)}%)
                </span>
            </div>
        </div>

    </div>`;
}

function renderChart() {
    const chartData = PROJECTS.map(p => {
        const m2    = PROJECT_M2[p.key];
        const areas = p.areas || { construccion: 0, urbanizacion: 0 };
        return {
            name:  p.name,
            casas: m2.casas > 0        ? Math.round(areas.construccion / m2.casas)        : 0,
            urb:   m2.urbanizacion > 0 ? Math.round(areas.urbanizacion / m2.urbanizacion) : 0,
        };
    }).sort((a, b) => b.casas - a.casas);

    const labels    = chartData.map(d => d.name);
    const dataCasas = chartData.map(d => d.casas);
    const dataUrb   = chartData.map(d => d.urb);
    const avgCasas  = Math.round(dataCasas.reduce((a, b) => a + b, 0) / dataCasas.length);
    const avgUrb    = Math.round(dataUrb.reduce((a, b) => a + b, 0) / dataUrb.length);

    // KPI chips
    document.getElementById('chartKpis').innerHTML = `
        <div class="chart-kpi">
            <div class="chart-kpi-dot chart-kpi-dot--casas"></div>
            <div class="chart-kpi-body">
                <span class="chart-kpi-lbl">Prom. Casas</span>
                <span class="chart-kpi-val">Q ${avgCasas.toLocaleString('es-GT')}/m²</span>
            </div>
        </div>
        <div class="chart-kpi">
            <div class="chart-kpi-dot chart-kpi-dot--urb"></div>
            <div class="chart-kpi-body">
                <span class="chart-kpi-lbl">Prom. Urbanización</span>
                <span class="chart-kpi-val">Q ${avgUrb.toLocaleString('es-GT')}/m²</span>
            </div>
        </div>`;

    document.getElementById('chartSection').style.display = '';
    Chart.register(ChartDataLabels);

    new Chart(document.getElementById('m2Chart'), {
        type: 'bar',
        data: {
            labels,
            datasets: [
                {
                    label: 'Casas',
                    data: dataCasas,
                    backgroundColor: (ctx) => dataCasas[ctx.dataIndex] >= avgCasas
                        ? 'rgba(201,168,76,0.90)' : 'rgba(201,168,76,0.50)',
                    hoverBackgroundColor: '#C9A84C',
                    borderRadius: 6,
                    borderSkipped: false,
                    barThickness: 18,
                },
                {
                    label: 'Urbanización',
                    data: dataUrb,
                    backgroundColor: (ctx) => dataUrb[ctx.dataIndex] >= avgUrb
                        ? 'rgba(59,130,246,0.85)' : 'rgba(59,130,246,0.45)',
                    hoverBackgroundColor: '#3b82f6',
                    borderRadius: 6,
                    borderSkipped: false,
                    barThickness: 18,
                },
            ],
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { right: 72 } },
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: (ctx) => `  ${ctx.dataset.label}: Q ${ctx.raw.toLocaleString('es-GT')} / m²`,
                        afterLabel: (ctx) => {
                            const avg = ctx.datasetIndex === 0 ? avgCasas : avgUrb;
                            const diff = ctx.raw - avg;
                            return `  ${diff >= 0 ? '▲' : '▼'} Q ${Math.abs(diff).toLocaleString('es-GT')} vs promedio`;
                        },
                    },
                    bodyFont: { family: 'Inter', size: 12 },
                    titleFont: { family: 'Inter', size: 12, weight: '700' },
                    backgroundColor: '#0f172a',
                    padding: 14,
                    cornerRadius: 10,
                    displayColors: true,
                    boxPadding: 4,
                },
                datalabels: {
                    anchor: 'end',
                    align: 'end',
                    formatter: (v) => `Q ${v.toLocaleString('es-GT')}`,
                    font: { family: 'Inter', size: 10, weight: '700' },
                    color: '#475569',
                    padding: { left: 4 },
                },
            },
            scales: {
                x: {
                    grid: { color: '#f1f5f9' },
                    ticks: {
                        font: { family: 'Inter', size: 10 },
                        color: '#cbd5e1',
                        callback: (v) => `Q ${(v/1000).toFixed(0)}k`,
                        maxTicksLimit: 7,
                    },
                    border: { color: 'transparent' },
                },
                y: {
                    grid: { display: false },
                    ticks: {
                        font: { family: 'Inter', size: 11, weight: '600' },
                        color: '#334155',
                        padding: 10,
                    },
                },
            },
        },
    });
}

const PROJECT_NAMES = {
    bdj: 'BDJ', bdp: 'BDP', bse: 'BSE', cse: 'CSE', hlq: 'HLQ', rdb: 'RDB'
};

async function loadTipologia() {
    try {
        const { data, error } = await client
            .from('casas_tipologia')
            .select('project_key, m2, tipologia, costo_m2')
            .eq('is_current', true)
            .order('m2', { ascending: false });

        if (error || !data || data.length === 0) return;

        // Proyectos presentes en los datos
        const projects = [...new Set(data.map(r => r.project_key))].sort();

        // Agrupar por (m2, tipologia)
        const rowMap = {};
        data.forEach(r => {
            const key = `${r.m2}_${r.tipologia}`;
            if (!rowMap[key]) rowMap[key] = { m2: r.m2, tipologia: r.tipologia, costs: {} };
            rowMap[key].costs[r.project_key] = r.costo_m2;
        });

        const rows = Object.values(rowMap).sort((a, b) => b.m2 - a.m2);

        // Calcular costo promedio por fila y max IBC para escalar barra
        rows.forEach(r => {
            const vals = Object.values(r.costs).filter(v => v > 0);
            r.avgCost = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
            r.ibc     = r.avgCost > 0 ? (r.m2 / r.avgCost) * 100 : 0;
        });
        const maxIbc = Math.max(...rows.map(r => r.ibc));

        // Thead
        document.getElementById('tipoThead').innerHTML = `<tr>
            <th>Metros</th>
            <th>Tipología</th>
            ${projects.map(k => `<th class="th-center">${PROJECT_NAMES[k] || k.toUpperCase()}</th>`).join('')}
            <th class="th-highlight">Prom. Costo por M²</th>
            <th class="th-ibc">IBC M²</th>
        </tr>`;

        // Tbody
        document.getElementById('tipoTbody').innerHTML = rows.map(r => {
            const badgeCls = r.tipologia.toLowerCase() === 'duplex' ? 'duplex' : 'individual';
            const projCols = projects.map(k =>
                r.costs[k]
                    ? `<td class="td-center tipo-proj-val">Q ${fmtM(r.costs[k])}</td>`
                    : `<td class="td-center"><span class="tipo-dash">—</span></td>`
            ).join('');
            return `<tr>
                <td><span class="tipo-metros">${fmtM(r.m2)} mts</span></td>
                <td><span class="tipo-badge tipo-badge--${badgeCls}">${r.tipologia}</span></td>
                ${projCols}
                <td class="td-center tipo-cost">Q ${fmtM(r.avgCost)}</td>
                <td class="td-center"><span class="tipo-ibc-val">${r.ibc.toFixed(2)}%</span></td>
            </tr>`;
        }).join('');

        // Insight cards — mejor y peor por IBC
        const best  = rows.reduce((a, b) => b.ibc > a.ibc ? b : a);
        const worst = rows.reduce((a, b) => b.ibc < a.ibc ? b : a);

        const insightCard = (row, type) => {
            const isBest = type === 'best';
            const badgeCls = row.tipologia.toLowerCase() === 'duplex' ? 'duplex' : 'individual';
            return `
            <div class="insight-card insight-card--${type}">
                <div>
                    <span class="insight-tag insight-tag--${type}">${isBest ? '✦ Más conveniente' : '⚠ Menos conveniente'}</span>
                </div>
                <div>
                    <div class="insight-name">${fmtM(row.m2)} mts</div>
                    <div class="insight-sub"><span class="tipo-badge tipo-badge--${badgeCls}" style="font-size:0.6rem;padding:3px 9px">${row.tipologia}</span></div>
                </div>
                <div class="insight-divider"></div>
                <div class="insight-stats">
                    <div class="insight-stat">
                        <span class="insight-stat-lbl">Prom. Costo / M²</span>
                        <span class="insight-stat-val">Q ${fmtM(row.avgCost)}</span>
                    </div>
                    <div class="insight-stat">
                        <span class="insight-stat-lbl">IBC M²</span>
                        <span class="insight-stat-val insight-stat-val--${isBest ? 'best' : 'warn'}">${row.ibc.toFixed(2)}%</span>
                    </div>
                    <div class="insight-stat">
                        <span class="insight-stat-lbl">Proyectos</span>
                        <span class="insight-stat-val">${Object.keys(row.costs).map(k => PROJECT_NAMES[k] || k.toUpperCase()).join(', ')}</span>
                    </div>
                </div>
            </div>`;
        };

        document.getElementById('tipoInsights').innerHTML =
            insightCard(best, 'best') + insightCard(worst, 'worst');

        document.getElementById('tipoSection').style.display = '';
    } catch (_) {}
}

async function init() {
    await loadData();
    const grid = document.getElementById('m2Grid');
    if (PROJECTS.every(p => !p.areas)) {
        grid.innerHTML = '<div class="m2-loading">No se pudieron cargar los datos de áreas.</div>';
        return;
    }
    grid.innerHTML = PROJECTS.map((p, i) => renderCard(p, i, PROJECTS)).join('');
    await loadTipologia();
    renderChart();
}

init();
