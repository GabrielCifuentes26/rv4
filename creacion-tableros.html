    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --nc:  #FEFAF4;
            --ng:  #C9A84C;
            --ng2: #A8832A;
            --nn:  #152540;
            --nb:  #F2E8D0;
            --nbd: #DDD0B0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #ffffff;
            color: var(--nn);
            overflow-x: hidden;
        }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(254,250,244,0.97);
            border-bottom: 1px solid var(--nbd);
            box-shadow: 0 2px 20px rgba(21,37,64,0.08);
            padding: 0 50px; height: 68px;
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(14px);
        }
        nav::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--nn) 0%, var(--ng) 45%, var(--nn) 100%);
        }

        .logo {
            font-size: 1.15rem; font-weight: 900; color: var(--nn);
            letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0;
            text-decoration: none;
        }
        .logo span { color: var(--ng); }

        .nav-menu { display: flex; align-items: center; gap: 2px; }
        .nav-link {
            display: flex; align-items: center; gap: 5px;
            color: var(--nn); font-size: 0.95rem; font-weight: 700;
            padding: 8px 18px; border-radius: 8px;
            text-decoration: none; background: none; border: none;
            cursor: pointer; font-family: inherit;
            transition: color .18s, background .18s;
            white-space: nowrap; letter-spacing: .3px;
        }
        .nav-link:hover { color: var(--ng2); background: var(--nb); }
        .nav-link .arrow { font-size: 0.68rem; transition: transform .2s; line-height: 1; }

        /* dropdown wrapper */
        .nav-item { position: relative; }
        .nav-item.open .arrow { transform: rotate(180deg); }
        .nav-item.open > .nav-link { color: var(--ng2); background: var(--nb); }

        /* dropdown panel */
        .drop-panel {
            position: absolute; top: calc(100% + 10px); left: 0;
            background: rgba(254,250,244,0.55);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.45);
            border-top: 2px solid var(--ng); border-radius: 0 0 14px 14px;
            box-shadow: 0 14px 40px rgba(21,37,64,0.18), inset 0 1px 0 rgba(255,255,255,0.5);
            min-width: 220px; padding: 6px;
            opacity: 0; visibility: hidden; transform: translateY(-8px);
            transition: opacity .22s ease, transform .22s ease, visibility .22s;
        }
        .nav-item.open .drop-panel { opacity: 1; visibility: visible; transform: translateY(0); }
        .drop-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border-radius: 8px;
            font-size: 0.87rem; font-weight: 600; color: var(--nn);
            text-decoration: none; border-left: 2px solid transparent;
            transition: background .15s, color .15s, border-color .15s;
        }
        .drop-item:hover { background: var(--nb); color: var(--ng2); border-left-color: var(--ng); }
        .drop-item.active { background: var(--nb); color: var(--ng2); border-left-color: var(--ng); }
        .drop-item-icon { font-size: 1rem; }

        /* nav actions */
        .nav-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .btn-admin {
            padding: 8px 18px; border-radius: 8px;
            font-size: 0.85rem; font-weight: 700; letter-spacing: .5px;
            color: var(--nn); background: var(--nb); border: 2px solid var(--ng);
            text-decoration: none; cursor: pointer; font-family: inherit;
            transition: background .18s, color .18s;
        }
        .btn-admin:hover { background: var(--ng); color: #fff; }
        .btn-logout {
            padding: 8px 20px; border-radius: 8px;
            font-size: 0.85rem; font-weight: 700; letter-spacing: .5px;
            color: #fff; background: var(--nn); border: 2px solid var(--nn);
            cursor: pointer; font-family: inherit;
            transition: background .18s, color .18s, border-color .18s;
        }
        .btn-logout:hover { background: var(--ng); border-color: var(--ng); }

        /* ── PAGE HEADER ── */
        .page-header {
            margin-top: 68px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0d1c31 0%, var(--nn) 55%, #1e3558 100%);
            min-height: 220px;
            display: flex; align-items: center;
            padding: 0 60px;
        }
        .page-header::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 70% 50%, rgba(201,168,76,0.10) 0%, transparent 65%);
        }
        .page-header::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent 0%, var(--ng) 40%, var(--ng) 60%, transparent 100%);
        }
        .page-header-body {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; gap: 10px;
        }
        .page-breadcrumb {
            display: flex; align-items: center; gap: 7px;
            font-size: 0.78rem; font-weight: 600; letter-spacing: .5px;
            text-transform: uppercase;
        }
        .page-breadcrumb a {
            color: rgba(201,168,76,0.75); text-decoration: none;
            transition: color .18s;
        }
        .page-breadcrumb a:hover { color: var(--ng); }
        .page-breadcrumb .sep { color: rgba(255,255,255,0.25); }
        .page-breadcrumb .current { color: var(--ng); }
        .page-header-title {
            font-size: 2.6rem; font-weight: 900;
            color: #ffffff; letter-spacing: -0.5px; line-height: 1.1;
        }
        .page-header-title span { color: var(--ng); }
        .page-header-sub {
            font-size: 0.92rem; font-weight: 500;
            color: rgba(255,255,255,0.55); margin-top: 2px;
        }
        .page-header-icon {
            position: absolute; right: 60px; top: 50%;
            transform: translateY(-50%);
            opacity: 0.07; pointer-events: none;
            line-height: 1;
        }
        .page-header-icon svg {
            width: 160px; height: 160px; fill: #ffffff;
        }

        /* ── PAGE CONTENT ── */
        .page-content {
            min-height: calc(100vh - 68px - 220px);
            background: #ffffff;
        }

        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .page-header { padding: 40px 24px; min-height: 180px; }
            .page-header-icon { display: none; }
            .page-header-title { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav id="mainNav">

        <h1 class="page-header-title">Creación de <span>Tableros</span></h1>

    </div>
    <div class="page-header-icon">

</div>

<div class="page-content"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const { createClient } = supabase;
    const client = createClient(
        'https://iipgrojliqeyycvgnkrc.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpcGdyb2psaXFleXljdmdua3JjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzA1NzYsImV4cCI6MjA5MTM0NjU3Nn0.Y6FQ-1qWd7HPMvTnK4alpKxM-YLJ5CsKmkorAZKMJrg'
    );

    async function doLogout() {
        await client.auth.signOut();
        window.location.href = 'login.html';
    }

    function toggleDrop(id) {
        const item = document.getElementById(id);
        const isOpen = item.classList.contains('open');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('open'));
        if (!isOpen) item.classList.add('open');
    }
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.nav-item')) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('open'));
        }
    });

    (async () => {
        const { data: { user } } = await client.auth.getUser();
        if (!user) return;
        const { data } = await client.from('usuarios').select('rol').eq('id', user.id).single();
        if (data?.rol === 'admin') {
            document.getElementById('btnAdmin').style.display = 'inline-block';
        }
    })();
</script>
